name: Build RTL8812EU Driver for OpenWRT

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWRT Version'
        required: true
        default: '23.05.5'
        type: choice
        options:
          - '22.03.7'
          - '23.05.5'
          - 'snapshot'
      target_system:
        description: 'Target System'
        required: true
        default: 'ramips/mt7621'
        type: choice
        options:
          - 'ramips/mt7621'
          - 'ath79/generic'
          - 'ipq40xx/generic'
      driver_branch:
        description: 'Driver Branch (svpcom/rtl8812eu)'
        required: true
        default: 'master'
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build-driver:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ['ramips/mt7621']
        include:
          - target: ramips/mt7621
            sdk_arch: ramips-mt7621
            target_name: Xiaomi Mi Router 3G
            device: xiaomi_mi-router-3g

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup build environment
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            clang \
            flex \
            bison \
            gawk \
            gettext \
            git \
            libncurses5-dev \
            libssl-dev \
            rsync \
            unzip \
            zlib1g-dev \
            zstd \
            xz-utils \
            python3 \
            python3-setuptools \
            file \
            wget \
            curl \
            time \
            patch \
            diffutils \
            cpio \
            gcc-multilib \
            g++-multilib

      - name: Get OpenWRT SDK
        id: sdk
        run: |
          VERSION="${{ github.event.inputs.openwrt_version }}"
          TARGET="${{ matrix.target }}"
          
          echo "OpenWRT Version: $VERSION"
          echo "Target: $TARGET"
          
          if [ "$VERSION" == "snapshot" ]; then
            SDK_URL="https://downloads.openwrt.org/snapshots/targets/${TARGET}/"
          else
            SDK_URL="https://downloads.openwrt.org/releases/${VERSION}/targets/${TARGET}/"
          fi
          
          echo "SDK_URL: $SDK_URL"
          echo "sdk_url=$SDK_URL" >> $GITHUB_OUTPUT
          
          # Get SDK filename
          SDK_HTML=$(curl -sL "$SDK_URL" | grep -oE 'openwrt-sdk-[^"]+\.tar\.xz' | head -n 1)
          
          if [ -z "$SDK_HTML" ]; then
            if [ "$VERSION" == "snapshot" ]; then
              SDK_FILENAME=$(curl -sL "$SDK_URL" | grep -oE 'openwrt-sdk-[0-9.]+-[^"]+\.tar\.xz' | head -n 1)
            else
              SDK_FILENAME="openwrt-sdk-${VERSION}-${{ matrix.sdk_arch }}_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
            fi
          else
            SDK_FILENAME="$SDK_HTML"
          fi
          
          echo "SDK Filename: $SDK_FILENAME"
          echo "sdk_filename=$SDK_FILENAME" >> $GITHUB_OUTPUT
          
          wget -O sdk.tar.xz "${SDK_URL}${SDK_FILENAME}" || {
            echo "Failed to download from ${SDK_URL}${SDK_FILENAME}"
            echo "Trying alternative..."
            if [ "$VERSION" == "23.05.5" ]; then
              wget -O sdk.tar.xz "https://downloads.openwrt.org/releases/23.05.5/targets/${TARGET}/openwrt-sdk-23.05.5-${{ matrix.sdk_arch }}_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
            elif [ "$VERSION" == "22.03.7" ]; then
              wget -O sdk.tar.xz "https://downloads.openwrt.org/releases/22.03.7/targets/${TARGET}/openwrt-sdk-22.03.7-${{ matrix.sdk_arch }}_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
            else
              exit 1
            fi
          }
          
          tar -xf sdk.tar.xz
          rm -f sdk.tar.xz
          
          SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*" | head -n 1)
          if [ -z "$SDK_DIR" ]; then
            echo "Cannot find SDK directory!"
            exit 1
          fi
          mv "$SDK_DIR" openwrt-sdk
          echo "sdk_dir=$(pwd)/openwrt-sdk" >> $GITHUB_OUTPUT

      - name: Create package structure
        run: |
          cd openwrt-sdk
          
          # Create package directory
          mkdir -p package/rtl8812eu
          
          # Clone svpcom driver
          echo "Cloning svpcom/rtl8812eu@${{ github.event.inputs.driver_branch }}"
          git clone --depth 1 -b "${{ github.event.inputs.driver_branch }}" \
            https://github.com/svpcom/rtl8812eu.git package/rtl8812eu/src || \
          git clone --depth 1 https://github.com/svpcom/rtl8812eu.git package/rtl8812eu/src
          
          echo "Driver source cloned successfully"

      - name: Create OpenWRT package Makefile
        run: |
          cd openwrt-sdk
          
          cat << 'EOF' > package/rtl8812eu/Makefile
          # OpenWRT Package Makefile for RTL8812EU (svpcom driver)
          
          include $(TOPDIR)/rules.mk
          include $(INCLUDE_DIR)/kernel.mk
          include $(INCLUDE_DIR)/package.mk
          
          PKG_NAME:=rtl8812eu
          PKG_VERSION:=svpcom
          PKG_RELEASE:=1
          PKG_BUILD_DIR:=$(KERNEL_BUILD_DIR)/$(PKG_NAME)
          
          define KernelPackage/rtl8812eu
            SUBMENU:=Wireless Drivers
            TITLE:=Realtek RTL8812EU Wireless Driver (svpcom)
            FILES:=$(PKG_BUILD_DIR)/8812eu.ko
            AUTOLOAD:=$(call AutoProbe,8812eu)
            DEPENDS:=+kmod-cfg80211 +kmod-usb-core +@DRIVER_11AC_SUPPORT
            PROVIDES:=kmod-rtl8812eu
          endef
          
          define KernelPackage/rtl8812eu/description
            Kernel module driver for Realtek RTL8812EU USB Wi-Fi adapters.
            Source: svpcom/rtl8812eu on GitHub.
            Optimized for FPV and high-throughput applications.
          endef
          
          define Build/Prepare
            mkdir -p $(PKG_BUILD_DIR)
            cp -r $(TOPDIR)/package/rtl8812eu/src/* $(PKG_BUILD_DIR)/
          endef
          
          define Build/Compile
            $(MAKE) -C "$(LINUX_DIR)" \
              ARCH="$(LINUX_KARCH)" \
              CROSS_COMPILE="$(TARGET_CROSS)" \
              M="$(PKG_BUILD_DIR)" \
              KCFLAGS="-w" \
              EXTRA_CFLAGS="-w -DCONFIG_LITTLE_ENDIAN" \
              USER_EXTRA_CFLAGS="-w -DCONFIG_LITTLE_ENDIAN" \
              modules
          endef
          
          $(eval $(call KernelPackage,rtl8812eu))
          EOF
          
          # Create kernel module Makefile
          cat << 'EOF' > package/rtl8812eu/src/Makefile
          # Kernel module Makefile for rtl8812eu (svpcom)
          
          # Use obj-m for kernel module
          obj-m := 8812eu.o
          
          # Include all source files
          8812eu-y := \
            hal/HalHWImg8812E_MAC.o \
            hal/HalHWImg8812E_BB.o \
            hal/HalHWImg8812E_RF.o \
            hal/HalPhyRf_8812E.o \
            hal/HalPwrSeqCmd.o \
            hal/rtl8812e_hal_init.o \
            hal/rtl8812e_phycfg.o \
            hal/rtl8812e_rf6052.o \
            hal/rtl8812e_dm.o \
            hal/rtl8812e_rxdesc.o \
            hal/rtl8812e_cmd.o \
            hal/rtl8812e_xmit.o \
            hal/rtl8812e_recv.o \
            hal/rtl8812e_led.o \
            core/rtw_ap.o \
            core/rtw_br_ext.o \
            core/rtw_cmd.o \
            core/rtw_debug.o \
            core/rtw_efuse.o \
            core/rtw_io.o \
            core/rtw_ioctl_query.o \
            core/rtw_ioctl_set.o \
            core/rtw_ieee80211.o \
            core/rtw_mlme.o \
            core/rtw_mlme_ext.o \
            core/rtw_mp.o \
            core/rtw_mp_ioctl.o \
            core/rtw_p2p.o \
            core/rtw_pwrctrl.o \
            core/rtw_recv.o \
            core/rtw_rf.o \
            core/rtw_security.o \
            core/rtw_sta_mgt.o \
            core/rtw_wlan_util.o \
            core/rtw_xmit.o \
            core/rtw_odm.o \
            core/rtw_bt.o \
            core/rtw_ioctl.o \
            core/rtw_sreset.o \
            core/rtw_wifi.o \
            core/rtw_wow.o \
            core/rtw_beamforming.o \
            os_dep/linux/rtw_android.o \
            os_dep/linux/rtw_cfgvendor.o \
            os_dep/linux/ioctl_cfg80211.o \
            os_dep/linux/rtw_ioctl.o \
            os_dep/linux/mlme_linux.o \
            os_dep/linux/recv_linux.o \
            os_dep/linux/xmit_linux.o \
            os_dep/linux/os_intfs.o \
            os_dep/linux/usb_intf.o \
            os_dep/linux/usb_ops_linux.o
          EOF

      - name: Build driver package
        run: |
          cd openwrt-sdk
          
          # Clean tmp
          rm -rf tmp
          
          # Configure SDK
          echo "CONFIG_PACKAGE_kmod-rtl8812eu=m" >> .config
          echo "CONFIG_DRIVER_11AC_SUPPORT=y" >> .config
          
          # Update configuration
          make defconfig
          
          # Build the package
          echo "Building RTL8812EU package..."
          make package/rtl8812eu/compile V=s -j$(nproc) || {
            echo "Build failed! Trying with single thread..."
            make package/rtl8812eu/compile V=s
          }
          
          # Collect artifacts
          mkdir -p ../release_assets
          
          echo "Looking for built packages..."
          find bin/ -type f -name "*.ipk" -exec ls -la {} \;
          find bin/ -type f -name "*rtl8812eu*.ipk" -exec cp {} ../release_assets/ \;
          
          if [ -z "$(ls -A ../release_assets/)" ]; then
            echo "No rtl8812eu package found. Searching all .ipk files..."
            find bin/ -type f -name "*.ipk" -exec cp {} ../release_assets/ \;
          fi
          
          echo "=== Built Assets ==="
          ls -la ../release_assets/

      - name: Generate build info
        run: |
          cd release_assets
          
          cat > README.md << 'EOF'
          # RTL8812EU Driver for OpenWRT
          
          ## Build Information
          
          - **Driver Source**: [svpcom/rtl8812eu](https://github.com/svpcom/rtl8812eu)
          - **Branch**: ${{ github.event.inputs.driver_branch }}
          - **OpenWRT Version**: ${{ github.event.inputs.openwrt_version }}
          - **Target**: ${{ matrix.target }}
          - **Device**: ${{ matrix.target_name }}
          - **Build Date**: $(date -u)
          - **Commit**: ${{ github.sha }}
          - **Build URL**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          
          ## Installation
          
          1. Copy the .ipk file to your OpenWRT router:
             ```bash
             scp kmod-rtl8812eu_*.ipk root@192.168.1.1:/tmp/
